<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="css/plugins/fonts.css">

<body>

    <div class="sc-overlay" id="sc-overlay">
    
        <div class="sc-card" id="sc-card">
    
            <!-- Logo -->
            <div class="sc-logo-wrap">
                <div class="sc-logo-ring"></div>
                <div class="sc-logo-circle">
                    <img src="imgs/logoSemiCode.png" alt="SemiCode logo" onerror="this.style.display='none';
                                    this.parentElement.querySelector('.sc-logo-fallback').style.display='flex';" />
                    <div class="sc-logo-fallback">
                        <span class="br">{</span>
                        <span class="mid">SC</span>
                        <span class="br">}</span>
                    </div>
                </div>
            </div>
    
            <!-- Brand -->
            <div class="sc-name">SemiCode</div>
            <div class="sc-sub">Plugins</div>
    
            <!-- Progress -->
            <div class="sc-progress-wrap">
                <div class="sc-progress-meta">
                    <span class="sc-pct-label">Loading</span>
                    <span class="sc-pct-val" id="sc-pct">0%</span>
                </div>
                <div class="sc-track">
                    <div class="sc-fill" id="sc-fill"></div>
                </div>
                <div class="sc-steps" id="sc-steps"></div>
            </div>
    
            <!-- Status message -->
            <div class="sc-status-msg" id="sc-msg">Initializing...</div>
    
    
        </div>
    </div>

    <header class="d-flex flex-column" id="PluginHeader">
        <nav class="navbar navbar-expand-md">
            <div class="container nav-content">

                <a class="navbar-brand" href="index.html">
                    <img src="imgs/logoSemiCode.png" alt="logo SemiCode" class="img-fluid">
                    <h4 class="mb-0 ms-1">SemiCode</h4>
                    <span class="navbar-brand__divider"></span>
                    <span class="navbar-brand__page">Plugins</span>
                </a>

                <button class="navbar-toggler" id="navToggle" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">

                    <div class="item ms-auto">
                        <form class="d-flex justify-content-center align-items-center" role="search">
                            <input class="form-control" type="search" name="q" placeholder="Search plugins..."
                                aria-label="Search plugins" autocomplete="off" />
                            <img src="imgs/icons/medicaments.gif" alt="Search" class="search-icon">
                        </form>
                    </div>

                    <ul class="navbar-nav mb-2 mb-lg-0 d-flex justify-content-evenly">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="plugins.html">Plugins</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>
        <main class=" container-fluid">
            <div class="row row-container">
                <aside class="sidebar is-closed" id="sidebar">
                    <div class="sidebar__inner">
                        <div class="sidebar__top d-none d-md-block">
                            <div class="sidebar__brand">
                                <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
                                    <span class="sidebar__toggle-lines">
                                        <div class="sidebar__toggle-line"></div>
                                    </span>
                                </button>

                                <div class="sidebar__brand-text">
                                    <h2>Plugins Category</h2>
                                </div>
                            </div>
                        </div>

                        <nav class="sidebar__nav" id="sidebar__nav">

                        </nav>
                    </div>
                </aside>

                <section class="plugins-row d-flex justify-content-center align-items-center" id="plugins-row">
                    <div class="cover" id="pluginsScrollContainer">
                        <div class="container-fluid d-flex justify-content-center" id="pluginsSection">
                            <div class="row" id="pluginsContainer">
                                
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </header>

    <script src="js/plugins/bootstrap.bundle.min.js"></script>
    <script src="js/data/plugins.js"></script>
    <script src="js/plugins/using_Plugins.js"></script>
    <script src="js/pages/loader.js"></script>
    <script src="js/functions.js"></script>
    <script src="js/pages/pluginsPgae.js"></script>
